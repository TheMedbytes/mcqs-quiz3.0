<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBytes | Admin Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <nav>
        <div class="logo"><span>MedBytes Admin</span></div>
        <button onclick="window.location.href='index.html'">View Portal</button>
    </nav>

    <main class="container">
        <div class="card">
            <h2>Excel Bulk Upload</h2>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Headers: subject, question, optionA, optionB, optionC, optionD, optionE, correctAnswer, explanation</p>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
            <button class="btn-primary" onclick="uploadExcel()" style="background:#27ae60">Process Excel</button>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>JSON Bulk Upload</h2>
            <textarea id="json-input" placeholder="Paste JSON array here..." style="width:100%; height:150px; margin-bottom:10px; font-family: monospace;"></textarea>
            <button class="btn-primary" onclick="uploadJSON()" style="background:#2980b9">Process JSON</button>
        </div>

        <div id="status-log" style="margin-top:20px; color: #2c3e50; font-family: monospace; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; max-height: 300px; overflow-y: auto;">
            <strong>System Log:</strong><br>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDc-yEvFYvP8_OZedCyIqXjpEOnocOe87k",
            authDomain: "the-medbytes-4e614.firebaseapp.com",
            projectId: "the-medbytes-4e614",
            storageBucket: "the-medbytes-4e614.firebasestorage.app",
            messagingSenderId: "508245128582",
            appId: "1:508245128582:web:c4285259f6812a30026807"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const log = (msg) => {
            const div = document.getElementById('status-log');
            div.innerHTML += `> ${msg}<br>`;
            div.scrollTop = div.scrollHeight;
        };

        // Hardened uploader function to prevent "undefined" field errors
        async function saveToFirestore(dataArray) {
            log(`Starting upload of ${dataArray.length} items...`);
            let successCount = 0;
            let errorCount = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const item = dataArray[i];
                try {
                    // Mapping with explicit safety fallbacks
                    const docData = {
                        subject: item.subject || "General", 
                        question: item.question || "Missing Question Text",
                        optionA: String(item.optionA || "N/A"),
                        optionB: String(item.optionB || "N/A"),
                        optionC: String(item.optionC || "N/A"),
                        optionD: String(item.optionD || "N/A"),
                        optionE: String(item.optionE || "N/A"),
                        // Safely handle correctAnswer formatting
                        correctAnswer: item.correctAnswer ? String(item.correctAnswer).toUpperCase().trim() : "A",
                        explanation: item.explanation || "No explanation provided."
                    };

                    await addDoc(collection(db, "mcqs"), docData);
                    successCount++;
                } catch (e) { 
                    errorCount++;
                    log(`Error at item ${i}: ${e.message}`); 
                }
            }
            log(`--- Upload Finished ---`);
            log(`Success: ${successCount} | Failed: ${errorCount}`);
            alert(`Process complete! ${successCount} MCQs added.`);
        }

        window.uploadExcel = () => {
            const file = document.getElementById('excel-file').files[0];
            if (!file) return alert("Please select an Excel file first.");
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                saveToFirestore(jsonData);
            };
            reader.readAsArrayBuffer(file);
        };

        window.uploadJSON = () => {
            const rawInput = document.getElementById('json-input').value;
            if (!rawInput.trim()) return alert("Please paste JSON data first.");
            
            try {
                const data = JSON.parse(rawInput);
                if(!Array.isArray(data)) throw new Error("Input must be a JSON array [ {...}, {...} ]");
                saveToFirestore(data);
            } catch (e) { 
                alert("Invalid JSON format: " + e.message); 
            }
        };
    </script>
</body>
</html>
